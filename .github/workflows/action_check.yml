name: 'Action Test'
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'main'
    tags-ignore:
      - '**'
    paths:
      - "**.ts"
      - ".github/workflows/action_check.yml"
      - "action.yml"
      - "dist/index.js"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Everything
        uses: ./
        with:
          api_token: ${{ secrets.TEST_TOKEN }}
          zone: ${{ secrets.TEST_ZONE }}

      - name: Test URL List
        uses: ./
        with:
          api_token: ${{ secrets.TEST_TOKEN }}
          zone: ${{ secrets.TEST_ZONE }}
          URLs: |
            https://azure.community.cyberjake.xyz/
            https://azure.community.cyberjake.xyz/favicon.ico

      - name: Test URL List
        uses: ./
        with:
          api_token: ${{ secrets.TEST_ACCOUNT_TOKEN }}
          zone: ${{ secrets.TEST_ZONE }}
          account_id: ${{ secrets.TEST_ACCOUNT_ID }}
          URLs: |
            https://azure.community.cyberjake.xyz/
            https://azure.community.cyberjake.xyz/favicon.ico

